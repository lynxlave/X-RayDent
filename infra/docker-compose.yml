services:
  landing:
    build:
      context: ..
      dockerfile: landing/Dockerfile
    ports:
      - "${LANDING_PORT:-4174}:4174"

  frontend:
    build:
      context: ..
      dockerfile: front-end/Dockerfile
    env_file:
      - ../.env
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - api-gateway

  api-gateway:
    build:
      context: ..
      dockerfile: backend/services/api-gateway/Dockerfile
    env_file:
      - ../.env
    environment:
      SERVICE_NAME: api-gateway
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    depends_on:
      - auth-service
      - patient-service
      - doctor-service
      - clinic-admin-service
      - imaging-service
      - analysis-service
      - report-service

  auth-service:
    build:
      context: ..
      dockerfile: backend/services/auth-service/Dockerfile
    env_file:
      - ../.env
    ports:
      - "${AUTH_SERVICE_PORT:-8001}:8001"

  patient-service:
    build:
      context: ..
      dockerfile: backend/services/patient-service/Dockerfile
    env_file:
      - ../.env
    ports:
      - "${PATIENT_SERVICE_PORT:-8002}:8002"

  doctor-service:
    build:
      context: ..
      dockerfile: backend/services/doctor-service/Dockerfile
    env_file:
      - ../.env
    ports:
      - "${DOCTOR_SERVICE_PORT:-8003}:8003"

  clinic-admin-service:
    build:
      context: ..
      dockerfile: backend/services/clinic-admin-service/Dockerfile
    env_file:
      - ../.env
    ports:
      - "${CLINIC_ADMIN_SERVICE_PORT:-8004}:8004"

  imaging-service:
    build:
      context: ..
      dockerfile: backend/services/imaging-service/Dockerfile
    env_file:
      - ../.env
    ports:
      - "${IMAGING_SERVICE_PORT:-8005}:8005"

  analysis-service:
    build:
      context: ..
      dockerfile: backend/services/analysis-service/Dockerfile
    env_file:
      - ../.env
    ports:
      - "${ANALYSIS_SERVICE_PORT:-8006}:8006"

  report-service:
    build:
      context: ..
      dockerfile: backend/services/report-service/Dockerfile
    env_file:
      - ../.env
    ports:
      - "${REPORT_SERVICE_PORT:-8007}:8007"

  notification-service:
    build:
      context: ..
      dockerfile: backend/services/notification-service/Dockerfile
    env_file:
      - ../.env
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8008}:8008"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xraydent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xraydent}
      POSTGRES_DB: ${POSTGRES_DB:-xraydent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-xraydent}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-xraydent123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
