services:
  landing:
    build:
      context: ../landing
      dockerfile: Dockerfile
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "${LANDING_PORT:-4174}:4174"
    volumes:
      - ../landing:/app
      - landing_node_modules:/app/node_modules
    command: >-
      sh -c "LOCK_HASH=$$(sha256sum package-lock.json | awk '{print $$1}');
      INSTALLED_HASH=$$(cat node_modules/.package-lock.hash 2>/dev/null || true);
      if [ ! -x node_modules/.bin/vite ] || [ \"$$LOCK_HASH\" != \"$$INSTALLED_HASH\" ]; then
      npm ci && printf '%s' \"$$LOCK_HASH\" > node_modules/.package-lock.hash;
      fi;
      npm run dev"

  frontend:
    build:
      context: ../front-end
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ../front-end:/app
      - frontend_node_modules:/app/node_modules
    command: >-
      sh -c "LOCK_HASH=$$(sha256sum package-lock.json | awk '{print $$1}');
      INSTALLED_HASH=$$(cat node_modules/.package-lock.hash 2>/dev/null || true);
      if [ ! -x node_modules/.bin/vite ] || [ \"$$LOCK_HASH\" != \"$$INSTALLED_HASH\" ]; then
      npm ci && printf '%s' \"$$LOCK_HASH\" > node_modules/.package-lock.hash;
      fi;
      npm run dev"
    depends_on:
      - api-gateway

  api-gateway:
    build:
      context: ../backend
      dockerfile: services/api-gateway/Dockerfile
    env_file:
      - ../.env
    environment:
      SERVICE_NAME: api-gateway
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    depends_on:
      - auth-service
      - patient-service
      - doctor-service
      - clinic-admin-service
      - imaging-service
      - analysis-service
      - report-service

  auth-service:
    build:
      context: ../backend
      dockerfile: services/auth-service/Dockerfile
    env_file:
      - ../.env
    ports:
      - "${AUTH_SERVICE_PORT:-8001}:8001"
    depends_on:
      - postgres

  patient-service:
    build:
      context: ../backend
      dockerfile: services/patient-service/Dockerfile
    env_file:
      - ../.env
    ports:
      - "${PATIENT_SERVICE_PORT:-8002}:8002"

  doctor-service:
    build:
      context: ../backend
      dockerfile: services/doctor-service/Dockerfile
    env_file:
      - ../.env
    ports:
      - "${DOCTOR_SERVICE_PORT:-8003}:8003"
    depends_on:
      - postgres

  clinic-admin-service:
    build:
      context: ../backend
      dockerfile: services/clinic-admin-service/Dockerfile
    env_file:
      - ../.env
    ports:
      - "${CLINIC_ADMIN_SERVICE_PORT:-8004}:8004"

  imaging-service:
    build:
      context: ../backend
      dockerfile: services/imaging-service/Dockerfile
    env_file:
      - ../.env
    ports:
      - "${IMAGING_SERVICE_PORT:-8005}:8005"

  analysis-service:
    build:
      context: ../backend
      dockerfile: services/analysis-service/Dockerfile
    env_file:
      - ../.env
    ports:
      - "${ANALYSIS_SERVICE_PORT:-8006}:8006"

  report-service:
    build:
      context: ../backend
      dockerfile: services/report-service/Dockerfile
    env_file:
      - ../.env
    ports:
      - "${REPORT_SERVICE_PORT:-8007}:8007"

  notification-service:
    build:
      context: ../backend
      dockerfile: services/notification-service/Dockerfile
    env_file:
      - ../.env
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8008}:8008"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xraydent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xraydent}
      POSTGRES_DB: ${POSTGRES_DB:-xraydent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-xraydent}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-xraydent123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

volumes:
  landing_node_modules:
  frontend_node_modules:
  postgres_data:
  minio_data:
