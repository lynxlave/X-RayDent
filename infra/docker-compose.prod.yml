services:
  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - landing
      - frontend
      - api-gateway

  landing:
    build:
      context: ..
      dockerfile: landing/Dockerfile.prod
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: front-end/Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.x-raydent.ru}
    restart: unless-stopped
    depends_on:
      - api-gateway

  api-gateway:
    build:
      context: ..
      dockerfile: backend/services/api-gateway/Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-../.env}
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      SERVICE_NAME: api-gateway
      FRONTEND_URL: ${FRONTEND_URL:-https://app.x-raydent.ru}
      LANDING_URL: ${LANDING_URL:-https://x-raydent.ru}
    depends_on:
      - auth-service
      - patient-service
      - doctor-service
      - clinic-admin-service
      - imaging-service
      - analysis-service
      - report-service

  auth-service:
    build:
      context: ..
      dockerfile: backend/services/auth-service/Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-../.env}
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    depends_on:
      - postgres

  patient-service:
    build:
      context: ..
      dockerfile: backend/services/patient-service/Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-../.env}
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

  doctor-service:
    build:
      context: ..
      dockerfile: backend/services/doctor-service/Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-../.env}
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    depends_on:
      - postgres

  clinic-admin-service:
    build:
      context: ..
      dockerfile: backend/services/clinic-admin-service/Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-../.env}
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

  imaging-service:
    build:
      context: ..
      dockerfile: backend/services/imaging-service/Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-../.env}
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

  analysis-service:
    build:
      context: ..
      dockerfile: backend/services/analysis-service/Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-../.env}
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

  report-service:
    build:
      context: ..
      dockerfile: backend/services/report-service/Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-../.env}
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

  notification-service:
    build:
      context: ..
      dockerfile: backend/services/notification-service/Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-../.env}
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xraydent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xraydent}
      POSTGRES_DB: ${POSTGRES_DB:-xraydent}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:4-management
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-xraydent}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-xraydent123}
    volumes:
      - minio_data:/data

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  minio_data:
